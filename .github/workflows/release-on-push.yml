name: Release On Push

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Prepare release metadata
        id: prepare
        env:
          RELEASE_REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: node scripts/release/prepare-release.mjs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        id: bump
        env:
          RELEASE_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          git add package.json
          git commit -m "chore: bump version to v${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package repository
        env:
          RELEASE_ARCHIVE_NAME: ${{ steps.prepare.outputs.archive_name }}
        run: |
          ARCHIVE_PATH="${RUNNER_TEMP}/${RELEASE_ARCHIVE_NAME}"
          zip -r "$ARCHIVE_PATH" . -x ".git/*" ".git"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.prepare.outputs.version }}
          target_commitish: ${{ steps.bump.outputs.sha }}
          name: ${{ steps.prepare.outputs.release_title }}
          body: |
            Version: ${{ steps.prepare.outputs.version }}
            Source Commit: ${{ github.sha }}
          files: ${{ env.ARCHIVE_PATH }}
          overwrite_files: true
